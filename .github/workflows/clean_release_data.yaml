name: Download and process EOIR data

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-and-release:
    runs-on: large-runner

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-renv@v2

      - name: Download data
        run: |
          mkdir -p inputs_eoir
          wget -O eoir_data.zip "https://fileshare.eoir.justice.gov/EOIR%20Case%20Data.zip"

      - name: Unzip data
        run: |
          unzip -j eoir_data.zip -d inputs_eoir
          rm eoir_data.zip
          mkdir -p tmp

      - name: Process data
        run: |
          mkdir -p outputs
          Rscript scripts/geography_join.R
          Rscript scripts/eoir_appeals.R
          Rscript scripts/eoir_associated_bond.R
          Rscript scripts/eoir_case.R
          Rscript scripts/eoir_court_applications.R
          Rscript scripts/eoir_custody_history.R
          Rscript scripts/eoir_lookups.R
          Rscript scripts/eoir_proceeding.R
          Rscript scripts/eoir_proceedings_charges.R
          Rscript scripts/eoir_case_joins.R

      - name: Commit and push to branch
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git checkout -b eoir-update-$(date +%Y-%m-%d)
          git add outputs/cases.parquet

          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "new_data=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update cases.parquet [skip ci]"
            git pull --rebase origin main
            git push --set-upstream origin HEAD
            echo "new_data=true" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        if: steps.commit.outputs.new_data == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Data update $(date +%Y-%m-%d)" \
            --body "Automated update: new EOIR data detected and processed." \
            --reviewer graemeblair \
            --base main

      - name: Trigger checks
        if: steps.commit.outputs.new_data == 'true'
        env:
          GH_TOKEN: ${{ secrets.CHECKS_PAT }}
        run: |
          BRANCH=$(git branch --show-current)
          gh api repos/deportationdata/checks/dispatches \
            -f event_type=eoir-updated \
            -f "client_payload[branch]=$BRANCH"
